<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AGames Share (LAN Instant Edition)</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #09090b; color: white;
    font-family: system-ui, -apple-system, sans-serif;
    padding: 20px; display: flex; flex-direction: column; gap: 20px; height: 100vh;
  }
  .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #7c3aed; padding-bottom: 10px; }
  .grid { display: flex; gap: 20px; flex: 1; min-height: 0; }
  .panel { flex: 1; background: #111113; border-radius: 12px; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
  textarea {
    flex: 1; background: #1c1c1f; border: 1px solid #3f3f46; color: #a7f3d0;
    padding: 10px; border-radius: 6px; resize: none; font-family: monospace; font-size: 11px; outline: none;
  }
  textarea:focus { border-color: #7c3aed; }
  button {
    background: #7c3aed; color: white; border: none; padding: 10px;
    border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.1s;
  }
  button:hover:not(:disabled) { background: #6d28d9; }
  button:disabled { background: #27272a; color: #71717a; cursor: not-allowed; }
  .video-container { flex: 2; display: flex; flex-direction: column; gap: 10px; }
  video { width: 100%; flex: 1; background: black; border-radius: 8px; object-fit: contain; }
  .status { font-weight: bold; color: #a1a1aa; }
</style>
</head>
<body>

<div class="header">
  <h2>AGAMES SHARE <span style="font-size:12px; color:#a1a1aa;">(Instant LAN Bypass)</span></h2>
  <div class="status" id="status">Status: Waiting for role choice...</div>
</div>

<div class="grid">
  <div class="panel" id="setup-panel">
    <h3>Step 1: Choose Role</h3>
    <div style="display:flex; gap:10px;">
      <button style="flex:1;" id="btn-init-host">I am Hosting</button>
      <button style="flex:1; background:#27272a;" id="btn-init-join">I am Joining</button>
    </div>
    
    <h3 style="margin-top:10px;">Step 2: Connection Key</h3>
    <p style="font-size:12px; color:#a1a1aa;">Copy the text from this box and send it to your friend, or paste theirs here.</p>
    
    <textarea id="sdp-box" placeholder="Keys will generate instantly here..."></textarea>
    <button id="btn-action" disabled>Process Key</button>
  </div>

  <div class="video-container">
    <div style="display:flex; gap:10px; flex: 1;">
      <div style="flex:1; position:relative;">
        <video id="local-video" autoplay playsinline muted></video>
        <span style="position:absolute; top:10px; left:10px; background:rgba(0,0,0,0.6); padding:4px 8px; border-radius:4px; font-size:12px;">Your Screen</span>
      </div>
      <div style="flex:1; position:relative;">
        <video id="remote-video" autoplay playsinline></video>
        <span style="position:absolute; top:10px; left:10px; background:rgba(0,0,0,0.6); padding:4px 8px; border-radius:4px; font-size:12px;">Opponent Screen</span>
      </div>
    </div>
  </div>
</div>

<script>
const statusEl = document.getElementById('status');
const sdpBox = document.getElementById('sdp-box');
const btnAction = document.getElementById('btn-action');
const btnInitHost = document.getElementById('btn-init-host');
const btnInitJoin = document.getElementById('btn-init-join');
const localVideo = document.getElementById('local-video');
const remoteVideo = document.getElementById('remote-video');

let pc = null;
let localStream = null;
let role = null;

// Empty iceServers prevents the browser from trying to ping outside networks, forcing immediate local key generation
const rtcConfig = { iceServers: [] };

async function startCapture() {
  try {
    localStream = await navigator.mediaDevices.getDisplayMedia({ video: { cursor: 'always' }, audio: false });
    localVideo.srcObject = localStream;
    return true;
  } catch (err) {
    statusEl.textContent = "Status: Screen permission denied.";
    statusEl.style.color = "#ef4444";
    return false;
  }
}

function createPeerConnection() {
  pc = new RTCPeerConnection(rtcConfig);
  
  if (localStream) {
    localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
  }

  pc.ontrack = (event) => {
    if (event.streams && event.streams[0]) {
      remoteVideo.srcObject = event.streams[0];
      statusEl.textContent = "Status: Connected!";
      statusEl.style.color = "#10b981";
    }
  };

  // Triggers immediate display without waiting for network gathering loops
  pc.onicecandidate = (e) => {
    if (!e.candidate) {
      console.log("ICE gathering finished.");
    }
  };
}

// HOST CLICK
btnInitHost.addEventListener('click', async () => {
  if (!await startCapture()) return;
  role = 'host';
  btnInitHost.disabled = true;
  btnInitJoin.disabled = true;
  
  createPeerConnection();
  
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  
  // Forces immediate key packing
  sdpBox.value = btoa(JSON.stringify(pc.localDescription));
  statusEl.textContent = "Status: Host Key Ready! Copy it and send to your friend.";
  statusEl.style.color = "#34d399";
  sdpBox.select();
  
  btnAction.disabled = false;
  btnAction.textContent = "Accept Joiner Key";
});

// JOINER CLICK
btnInitJoin.addEventListener('click', async () => {
  if (!await startCapture()) return;
  role = 'joiner';
  btnInitHost.disabled = true;
  btnInitJoin.disabled = true;
  btnAction.disabled = false;
  btnAction.textContent = "Generate Joiner Answer Key";
  sdpBox.placeholder = "PASTE Host Key Here First, then click the button below...";
  statusEl.textContent = "Status: Paste Host Key to continue.";
});

// PROCESS ACTION
btnAction.addEventListener('click', async () => {
  const inputData = sdpBox.value.trim();
  if (!inputData) { alert("Please input text data first."); return; }

  try {
    const parsedSDP = JSON.parse(atob(inputData));

    if (role === 'host') {
      await pc.setRemoteDescription(new RTCSessionDescription(parsedSDP));
      statusEl.textContent = "Status: Connecting streams directly...";
      statusEl.style.color = "#3b82f6";
    } 
    else if (role === 'joiner') {
      if (!pc) {
        createPeerConnection();
        await pc.setRemoteDescription(new RTCSessionDescription(parsedSDP));
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        
        // Instantly display the answer key for the joiner to copy back
        sdpBox.value = btoa(JSON.stringify(pc.localDescription));
        statusEl.textContent = "Status: Answer Key Generated! Copy this back to the Host.";
        statusEl.style.color = "#a855f7";
        sdpBox.select();
        btnAction.textContent = "Waiting for Host...";
        btnAction.disabled = true;
      }
    }
  } catch (err) {
    console.error(err);
    alert("Key error. Make sure you copied the entire text block cleanly.");
  }
});
</script>
</body>
</html>
