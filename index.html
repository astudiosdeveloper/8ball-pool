<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8 Ball Pool - AGAMES 2026</title>

<!-- PeerJS WebRTC Connection Library -->
<script src="https://unpkg.com"></script>

<style>
html, body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:black;
  font-family: Arial, sans-serif;
}

#game-frame{
  width:100%;
  height:100%;
  border:none;
}

/* CINEMATIC INTRO */
#intro{
  position:fixed;
  inset:0;
  background: radial-gradient(circle at center, #14081f 0%, #000 75%);
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  z-index:99999999;
  animation:fadeOut 1s forwards;
  animation-delay:2s;
  pointer-events: none;
}

#intro::before{
  content:"";
  position:absolute;
  width:500px;
  height:500px;
  border-radius:50%;
  background: radial-gradient(circle, rgba(168,85,247,0.4) 0%, transparent 70%);
  animation:pulseGlow 2s ease-in-out infinite;
  filter:blur(40px);
}

#intro-text{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%) scale(0.6);
  color:white;
  font-size:3rem;
  font-weight:900;
  letter-spacing:8px;
  text-transform:uppercase;
  text-align:center;
  white-space:nowrap;
  opacity:0;
  text-shadow: 0 0 10px white, 0 0 25px #a855f7, 0 0 60px #a855f7;
  animation: cinematicPop 1.4s ease forwards, textPulse 1.8s ease-in-out infinite;
}

.particle{
  position:absolute;
  width:4px;
  height:4px;
  border-radius:50%;
  background:white;
  opacity:0.8;
  animation:floatParticle linear infinite;
}
.p1{left:30%; top:100%; animation-duration:5s;}
.p2{left:40%; top:100%; animation-duration:6s;}
.p3{left:50%; top:100%; animation-duration:5.5s;}
.p4{left:60%; top:100%; animation-duration:6.5s;}
.p5{left:70%; top:100%; animation-duration:5.2s;}

@keyframes cinematicPop{
  0%{ opacity:0; transform:translate(-50%, -50%) scale(0.4); letter-spacing:20px; filter:blur(12px); }
  60%{ opacity:1; transform:translate(-50%, -50%) scale(1.08); letter-spacing:10px; filter:blur(0px); }
  100%{ opacity:1; transform:translate(-50%, -50%) scale(1); letter-spacing:8px; }
}
@keyframes pulseGlow{
  0%,100%{ transform:scale(1); opacity:0.5; }
  50%{ transform:scale(1.15); opacity:1; }
}
@keyframes textPulse{
  0%,100%{ transform:translate(-50%, -50%) scale(1); }
  50%{ transform:translate(-50%, -50%) scale(1.03); }
}
@keyframes floatParticle{
  from{ transform:translateY(0px) scale(0); opacity:0; }
  20%{ opacity:1; }
  to{ transform:translateY(-110vh) scale(1.3); opacity:0; }
}
@keyframes fadeOut{
  to{ opacity:0; visibility:hidden; }
}

/* RumbleTalk Layer Override */
#rt-7c332e278c8731a1485a7aeecf5faf4c{
  z-index:999999 !important;
}

/* STREAM CONTAINER & INTERFACE */
#stream-toggle-btn {
  position: fixed;
  bottom: 20px;
  right: 90px;
  width: 55px;
  height: 55px;
  background: #a855f7;
  border: 2px solid white;
  border-radius: 50%;
  cursor: pointer;
  z-index: 99999;
  box-shadow: 0 0 15px rgba(168,85,247,0.7);
  display: flex;
  justify-content: center;
  align-items: center;
  transition: transform 0.2s;
}
#stream-toggle-btn:hover { transform: scale(1.1); background: #9333ea; }
#stream-toggle-btn svg { width: 26px; height: 26px; fill: white; }

#stream-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.95);
  z-index: 99998;
  display: none;
  flex-direction: column;
  color: white;
}
#stream-menu {
  height: 60px;
  background: #14081f;
  border-bottom: 2px solid #a855f7;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  box-sizing: border-box;
}
.menu-group { display: flex; align-items: center; gap: 10px; }
#stream-menu input {
  background: #261438;
  border: 1px solid #a855f7;
  color: white;
  padding: 6px 12px;
  border-radius: 4px;
  font-size: 14px;
  width: 150px;
  text-align: center;
}
#stream-menu button {
  background: #a855f7;
  color: white;
  border: none;
  padding: 7px 15px;
  border-radius: 4px;
  cursor: pointer;
  font-weight: bold;
}
#stream-menu button:hover { background: #9333ea; }
#close-overlay { background: #ef4444 !important; }

#video-grid {
  flex: 1;
  display: flex;
  width: 100%;
  height: calc(100% - 60px);
  background: #05020a;
}
.video-wrapper {
  flex: 1;
  height: 100%;
  position: relative;
  background: #111;
  border: 1px solid #222;
  display: flex;
  justify-content: center;
  align-items: center;
}
.video-wrapper video { width: 100%; height: 100%; object-fit: contain; background: black; }
.video-label {
  position: absolute;
  top: 15px;
  left: 15px;
  background: rgba(0,0,0,0.7);
  padding: 5px 12px;
  border-radius: 4px;
  font-size: 13px;
  border-left: 3px solid #a855f7;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <div class="particle p1"></div>
  <div class="particle p2"></div>
  <div class="particle p3"></div>
  <div class="particle p4"></div>
  <div class="particle p5"></div>
  <div id="intro-text">Product of AGames</div>
</div>

<!-- GAME (FIXED URL PATH TO TARGET THE EXACT EMBED SUBDOMAIN SOURCE) -->
<iframe
  id="game-frame"
  src="https://bloobio-eightballpool.coolmathgames.com/8ballpool"
  allowfullscreen>
</iframe>

<!-- STREAM INTERFACE HUD -->
<button id="stream-toggle-btn" title="Toggle Streams">
    <svg viewBox="0 0 24 24"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55 .45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4zM14 16H5V8h9v8z"/></svg>
</button>

<div id="stream-overlay">
    <div id="stream-menu">
        <div class="menu-group">
            <span style="font-weight: bold; color: #a855f7;">AGAMES STREAM</span>
            <span id="status-text" style="color: #a3a3a3; font-size:13px;">| Status: Disconnected</span>
        </div>
        <div class="menu-group">
            <button id="btn-host">Host Game</button>
            <span style="color:#a3a3a3;" id="or-label">or</span>
            <input type="text" id="room-input" placeholder="Enter 4-Digit Code" maxlength="4">
            <button id="btn-join">Join Game</button>
            <button id="close-overlay">Minimize</button>
        </div>
    </div>
    <div id="video-grid">
        <div class="video-wrapper">
            <video id="local-video" autoplay playsinline muted></video>
            <div class="video-label">Your Screen (You)</div>
        </div>
        <div class="video-wrapper">
            <video id="remote-video" autoplay playsinline></video>
            <div class="video-label">Opponent Stream</div>
        </div>
    </div>
</div>

<!-- RumbleTalk Chat -->
<div 
  id="rt-7c332e278c8731a1485a7aeecf5faf4c"
  data-floating="true"
  data-side="right"
  data-width="700"
  data-height="500"
  data-user-counter="14,23"
  data-message-counter="0,60">
</div>

<script src="https://rumbletalk.com"></script>

<!-- Connect back to your decoupled logic routing system -->
<script src="app.js"></script>
</body>
</html>
