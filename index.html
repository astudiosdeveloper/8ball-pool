<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AGames - Pure P2P Screen Share</title>

<!-- PeerJS WebRTC Connection Library Script -->
<script src="https://unpkg.com"></script>

<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #09090b;
  font-family: system-ui, -apple-system, sans-serif;
  color: white;
}

/* TOP DASHBOARD CONTROL MENU */
#control-menu {
  height: 80px;
  background: #18181b;
  border-bottom: 3px solid #a855f7;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  box-sizing: border-box;
}

.menu-group { display: flex; align-items: center; gap: 15px; }

#status-text {
  font-size: 15px;
  color: #a1a1aa;
  font-weight: 500;
}

/* VISUAL BANNER BOX FOR GENERATED CODE */
#code-box {
  display: none;
  background: #2e1065;
  border: 2px solid #c084fc;
  color: #f3e8ff;
  padding: 8px 16px;
  border-radius: 8px;
  font-size: 18px;
  font-weight: 800;
  letter-spacing: 1px;
  box-shadow: 0 0 15px rgba(192, 132, 252, 0.4);
}

/* GLOWING CONNECTED INDICATOR BADGE */
#conn-indicator {
  display: none;
  background: #064e3b;
  border: 2px solid #34d399;
  color: #a7f3d0;
  padding: 8px 16px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  box-shadow: 0 0 15px rgba(52, 211, 153, 0.4);
  animation: pulseGlow 2s infinite;
}

@keyframes pulseGlow {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.8; transform: scale(0.98); }
}

#room-input {
  background: #27272a;
  border: 1px solid #a855f7;
  color: white;
  padding: 8px 12px;
  border-radius: 6px;
  font-size: 14px;
  width: 160px;
  text-align: center;
  outline: none;
}

button {
  background: #a855f7;
  color: white;
  border: none;
  padding: 10px 20px;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
  font-size: 14px;
  transition: background 0.2s;
}
button:hover { background: #9333ea; }
button:disabled { background: #3f3f46; color: #a1a1aa; cursor: not-allowed; }

/* 50/50 SPLIT SCREEN VIDEO GRID */
#video-grid {
  display: flex;
  width: 100%;
  height: calc(100% - 80px);
  background: #09090b;
}

.video-wrapper {
  flex: 1;
  height: 100%;
  position: relative;
  background: #111;
  border: 1px solid #27272a;
  display: flex;
  justify-content: center;
  align-items: center;
}

.video-wrapper video {
  width: 100%;
  height: 100%;
  object-fit: contain;
  background: black;
}

.video-label {
  position: absolute;
  top: 15px;
  left: 15px;
  background: rgba(9, 9, 11, 0.85);
  padding: 6px 14px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 600;
  border-left: 3px solid #a855f7;
  pointer-events: none;
}
</style>
</head>
<body>

    <div id="control-menu">
        <div class="menu-group">
            <span style="font-weight: 800; color: #a855f7; letter-spacing: 0.5px; font-size: 18px;">AGAMES SHARE</span>
            <span id="status-text">Status: Ready to Stream</span>
            <div id="code-box">ROOM CODE: <span id="generated-code-text">0000</span></div>
            <div id="conn-indicator">● Live Connected</div>
        </div>
        <div class="menu-group" id="interactive-actions">
            <button id="btn-host">Host Live Screen</button>
            <span style="color: #71717a;" id="or-separator">or</span>
            <input type="text" id="room-input" placeholder="Enter Friend's Code" maxlength="4">
            <button id="btn-join">Join Stream</button>
        </div>
    </div>

    <div id="video-grid">
        <div class="video-wrapper">
            <video id="local-video" autoplay playsinline muted></video>
            <div class="video-label">Your Screen Feed</div>
        </div>
        <div class="video-wrapper">
            <video id="remote-video" autoplay playsinline></video>
            <div class="video-label">Connected Friend's Screen</div>
        </div>
    </div>

<script>
const roomInput = document.getElementById('room-input');
const btnHost = document.getElementById('btn-host');
const btnJoin = document.getElementById('btn-join');
const statusText = document.getElementById('status-text');
const localVideo = document.getElementById('local-video');
const remoteVideo = document.getElementById('remote-video');
const codeBox = document.getElementById('code-box');
const generatedCodeText = document.getElementById('generated-code-text');
const orSeparator = document.getElementById('or-separator');
const connIndicator = document.getElementById('conn-indicator');

let peer = null;
let localStream = null;

// Clean function to update UI layout when connection goes fully online
function setOnlineUI() {
    connIndicator.style.display = "block";
    statusText.style.display = "none";
    btnHost.style.display = "none";
    btnJoin.style.display = "none";
    roomInput.style.display = "none";
    orSeparator.style.display = "none";
}

// Request permission to capture browser display panels
async function startCapture() {
    try {
        localStream = await navigator.mediaDevices.getDisplayMedia({ 
            video: { cursor: "always" }, 
            audio: false 
        });
        localVideo.srcObject = localStream;
        return true;
    } catch (err) {
        statusText.innerText = "Status: Screen capture permission denied.";
        statusText.style.color = "#f43f5e";
        return false;
    }
}

// HOST CONNECTION LOGIC
btnHost.addEventListener('click', async () => {
    statusText.innerText = "Status: Awaiting screen confirmation popup...";
    statusText.style.color = "#f59e0b";

    const success = await startCapture();
    if (!success) return; 

    const randomCode = Math.floor(1000 + Math.random() * 9000).toString();
    
    // Setup hosting visuals
    btnHost.style.display = "none";
    btnJoin.style.display = "none";
    roomInput.style.display = "none";
    orSeparator.style.display = "none";
    statusText.style.display = "none";
    generatedCodeText.innerText = randomCode;
    codeBox.style.display = "block";

    peer = new Peer(`agames-share-${randomCode}`, { debug: 1 });

    // Catch incoming connections and link video tracks up immediately
    peer.on('call', (call) => {
        call.answer(localStream); 
        
        call.on('stream', (remoteStream) => {
            remoteVideo.srcObject = remoteStream;
            setOnlineUI(); // Trigger neon green connected badge
        });
        
        call.on('close', () => {
            remoteVideo.srcObject = null;
            connIndicator.style.display = "none";
        });
    });
});

// CLIENT JOIN LOGIC
btnJoin.addEventListener('click', async () => {
    const code = roomInput.value.trim();
    if (code.length !== 4 || isNaN(code)) {
        alert("Please enter a valid 4-digit code.");
        return;
    }

    const success = await startCapture();
    if (!success) return;

    peer = new Peer({ debug: 1 });
    statusText.innerText = "Status: Connecting to room code...";
    statusText.style.color = "#f59e0b";

    peer.on('open', () => {
        const targetPeerId = `agames-share-${code}`;
        
        // Fire out transmission call parameter structure
        const call = peer.call(targetPeerId, localStream);
        
        call.on('stream', (remoteStream) => {
            remoteVideo.srcObject = remoteStream;
            setOnlineUI(); // Trigger neon green connected badge on join side too
        });

        call.on('close', () => {
            remoteVideo.srcObject = null;
            connIndicator.style.display = "none";
        });
    });

    // Handle incoming stream backup calls if the host re-signals a media line link
    peer.on('call', (incomingCall) => {
        incomingCall.answer(localStream);
        incomingCall.on('stream', (remoteStream) => {
            remoteVideo.srcObject = remoteStream;
            setOnlineUI();
        });
    });

    peer.on('error', (err) => {
        console.error(err);
        statusText.innerText = "Status: Connection failed. Verify host room code.";
        statusText.style.color = "#f43f5e";
    });
});
</script>

</body>
</html>
