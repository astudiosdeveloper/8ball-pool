<!DOCTYPE html>

<head>

<style>
html, body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:black;
}
#game-frame{
  width:100%;
  height:100%;
  border:none;
}
#intro{
  position:fixed;
  inset:0;
  background:radial-gradient(circle at center, #14081f 0%, #000 75%);
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  z-index:99999999;
  animation:fadeOut 1s forwards;
  animation-delay:2s;
}
#intro::before{
  content:"";
  position:absolute;
  width:500px;
  height:500px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(168,85,247,0.4) 0%, transparent 70%);
  animation:pulseGlow 2s ease-in-out infinite;
  filter:blur(40px);
}
#intro-text{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%) scale(0.6);
  color:white;
  font-family:Arial, sans-serif;
  font-size:3rem;
  font-weight:900;
  letter-spacing:8px;
  text-transform:uppercase;
  text-align:center;
  white-space:nowrap;
  opacity:0;
  text-shadow:0 0 10px white, 0 0 25px #a855f7, 0 0 60px #a855f7;
  animation:cinematicPop 1.4s ease forwards, textPulse 1.8s ease-in-out infinite;
}
.particle{
  position:absolute;
  width:4px;
  height:4px;
  border-radius:50%;
  background:white;
  opacity:0.8;
  animation:floatParticle linear infinite;
}
.p1{left:30%;top:100%;animation-duration:5s;}
.p2{left:40%;top:100%;animation-duration:6s;}
.p3{left:50%;top:100%;animation-duration:5.5s;}
.p4{left:60%;top:100%;animation-duration:6.5s;}
.p5{left:70%;top:100%;animation-duration:5.2s;}
@keyframes cinematicPop{
  0%{opacity:0;transform:translate(-50%,-50%) scale(0.4);letter-spacing:20px;filter:blur(12px);}
  60%{opacity:1;transform:translate(-50%,-50%) scale(1.08);letter-spacing:10px;filter:blur(0px);}
  100%{opacity:1;transform:translate(-50%,-50%) scale(1);letter-spacing:8px;}
}
@keyframes pulseGlow{
  0%,100%{transform:scale(1);opacity:0.5;}
  50%{transform:scale(1.15);opacity:1;}
}
@keyframes textPulse{
  0%,100%{transform:translate(-50%,-50%) scale(1);}
  50%{transform:translate(-50%,-50%) scale(1.03);}
}
@keyframes floatParticle{
  from{transform:translateY(0px) scale(0);opacity:0;}
  20%{opacity:1;}
  to{transform:translateY(-110vh) scale(1.3);opacity:0;}
}
@keyframes fadeOut{
  to{opacity:0;visibility:hidden;}
}
#rt-7c332e278c8731a1485a7aeecf5faf4c{
  z-index:999999 !important;
}

/* ── RECORD BUTTON ── */
#record-btn{
  position:fixed;
  bottom:20px;
  right:150px;
  z-index:9999999;
  width:52px;
  height:52px;
  border-radius:50%;
  border:none;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#1a1a2e;
  box-shadow:0 4px 18px rgba(168,85,247,0.5), 0 0 0 2px #a855f7;
  transition:transform 0.15s ease, box-shadow 0.15s ease;
}
#record-btn:hover{
  transform:scale(1.1);
  box-shadow:0 6px 24px rgba(168,85,247,0.8), 0 0 0 2px #c084fc;
}
#record-btn svg{pointer-events:none;}
#record-btn.recording{
  box-shadow:0 0 0 2px #ef4444;
  animation:recordPulse 1s ease-in-out infinite;
}
@keyframes recordPulse{
  0%,100%{box-shadow:0 0 0 2px #ef4444, 0 0 0 0 rgba(239,68,68,0.4);}
  50%{box-shadow:0 0 0 2px #ef4444, 0 0 12px 4px rgba(239,68,68,0.25);}
}
#rec-toast{
  position:fixed;
  bottom:82px;
  right:70px;
  z-index:9999999;
  background:rgba(20,8,31,0.95);
  color:#e9d5ff;
  font-family:Arial, sans-serif;
  font-size:13px;
  padding:8px 14px;
  border-radius:10px;
  border:1px solid #a855f7;
  box-shadow:0 4px 16px rgba(168,85,247,0.3);
  pointer-events:none;
  opacity:0;
  transform:translateY(6px);
  transition:opacity 0.25s ease, transform 0.25s ease;
  white-space:nowrap;
}
#rec-toast.show{opacity:1;transform:translateY(0);}
</style>

<body>

<div id="intro">
  <div class="particle p1"></div>
  <div class="particle p2"></div>
  <div class="particle p3"></div>

<iframe
  id="game-frame"
  src="https://bloobio-eightballpool.coolmathgames.com/8ballpool"

</iframe>

<button id="record-btn" title="Record last 10 seconds">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="12" cy="12" r="5" fill="#ef4444"/>
    <path d="M17 9l4-2v10l-4-2V9z" fill="#a855f7"/>
    <rect x="2" y="7" width="13" height="10" rx="2" fill="#a855f7"/>
  </svg>
</button>

<div id="rec-toast"></div>

<div
  id="rt-7c332e278c8731a1485a7aeecf5faf4c"
  data-floating="true"
  data-side="right"
  data-width="700"
  data-height="500"
  data-user-counter="14,23"
  data-message-counter="0,60">
</div>
<script src="https://rumbletalk.com/client/?@rI!_pc1"></script>

<script>
(function () {
  const BUFFER_MS = 5000;

  let mediaRecorder = null;
  let headerChunk = null;       // very first chunk — always has the WebM EBML header
  let timedChunks = [];         // { blob, ts } — rolling window
  let isCapturing = false;
  let toastTimer = null;

  const btn   = document.getElementById('record-btn');
  const toast = document.getElementById('rec-toast');

  function showToast(msg, duration) {
    clearTimeout(toastTimer);
    toast.textContent = msg;
    toast.classList.add('show');
    if (duration) {
      toastTimer = setTimeout(() => toast.classList.remove('show'), duration);
    }
  }
  function hideToast() {
    clearTimeout(toastTimer);
    toast.classList.remove('show');
  }

  async function startCapture() {
    try {
      const displayStream = await navigator.mediaDevices.getDisplayMedia({
        video: { frameRate: 30, cursor: 'always' },
        audio: false,
        preferCurrentTab: true
      });

      // Best supported mimeType
      const mimeType = [
        'video/webm;codecs=vp9',
        'video/webm;codecs=vp8',
        'video/webm'
      ].find(m => MediaRecorder.isTypeSupported(m)) || '';

      const options = { mimeType: mimeType || undefined };
      // Request keyframes frequently so any 10s slice is decodable
      if (mimeType) options.videoBitsPerSecond = 2500000;

      mediaRecorder = new MediaRecorder(displayStream, options);
      headerChunk = null;
      timedChunks = [];

      mediaRecorder.ondataavailable = (e) => {
        if (!e.data || e.data.size === 0) return;
        const now = Date.now();

        if (!headerChunk) {
          // First chunk always contains the WebM EBML header — keep it forever
          headerChunk = e.data;
        } else {
          timedChunks.push({ blob: e.data, ts: now });
          // Drop chunks older than BUFFER_MS
          const cutoff = now - BUFFER_MS;
          timedChunks = timedChunks.filter(c => c.ts >= cutoff);
        }
      };

      // User closed the browser share dialog
      displayStream.getVideoTracks()[0].onended = () => {
        if (isCapturing) stopAndSave();
      };

      // Collect a chunk every 200ms; also request keyframes every 1s
      // so slices don't depend on frames outside the window
      mediaRecorder.start(200);
      isCapturing = true;
      btn.classList.add('recording');
      showToast('🔴 Buffering… click again to save last 10s');

    } catch (err) {
      if (err.name !== 'NotAllowedError') {
        showToast('⚠️ Could not start: ' + err.message, 3000);
      }
    }
  }

  function stopAndSave() {
    if (!mediaRecorder) return;

    mediaRecorder.onstop = () => {
      isCapturing = false;
      btn.classList.remove('recording');

      if (!headerChunk || timedChunks.length === 0) {
        showToast('⚠️ Nothing recorded yet', 2500);
        mediaRecorder = null;
        return;
      }

      // Build the final blob: header + all rolling chunks
      const parts = [headerChunk, ...timedChunks.map(c => c.blob)];
      const mimeType = headerChunk.type || 'video/webm';
      const blob = new Blob(parts, { type: mimeType });

      const url = URL.createObjectURL(blob);
      const a   = document.createElement('a');
      a.href     = url;
      a.download = `agames-clip-${Date.now()}.webm`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 15000);

      hideToast();
      showToast('✅ Clip saved! Open in Chrome or VLC.', 3500);
      mediaRecorder = null;
    };

    // Flush any pending data before stopping
    if (mediaRecorder.state === 'recording') {
      mediaRecorder.requestData();
    }
    setTimeout(() => {
      if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        mediaRecorder.stop();
        mediaRecorder.stream?.getTracks().forEach(t => t.stop());
      }
    }, 300);
  }

  btn.addEventListener('click', () => {
    if (!isCapturing) {
      startCapture();
    } else {
      stopAndSave();
    }
  });

  if (!navigator.mediaDevices?.getDisplayMedia) {
    btn.title   = 'Screen recording not supported in this browser';
    btn.style.opacity = '0.4';
    btn.style.cursor  = 'not-allowed';
    btn.addEventListener('click', (e) => {
      e.stopImmediatePropagation();
      showToast('⚠️ Use Chrome or Edge for recording', 3000);
    }, true);
  }
})();
</script>

</body>
