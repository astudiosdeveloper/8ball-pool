<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AGames - Pure Firewall Bypass Share</title>

<!-- PeerJS WebRTC Connection Library Script -->
<script src="https://unpkg.com"></script>

<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #09090b;
  font-family: system-ui, -apple-system, sans-serif;
  color: white;
}

/* TOP DASHBOARD CONTROL MENU */
#control-menu {
  height: 80px;
  background: #18181b;
  border-bottom: 3px solid #a855f7;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  box-sizing: border-box;
}

.menu-group { display: flex; align-items: center; gap: 15px; }

#status-text {
  font-size: 15px;
  color: #a1a1aa;
  font-weight: 500;
}

#room-input {
  background: #27272a;
  border: 1px solid #a855f7;
  color: white;
  padding: 8px 12px;
  border-radius: 6px;
  font-size: 14px;
  width: 160px;
  text-align: center;
  outline: none;
}

button {
  background: #a855f7;
  color: white;
  border: none;
  padding: 10px 20px;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
  font-size: 14px;
  transition: background 0.2s;
}
button:hover { background: #9333ea; }
button:disabled { background: #3f3f46; color: #a1a1aa; cursor: not-allowed; }

/* 50/50 SPLIT SCREEN VIDEO GRID */
#video-grid {
  display: flex;
  width: 100%;
  height: calc(100% - 80px);
  background: #09090b;
}

.video-wrapper {
  flex: 1;
  height: 100%;
  position: relative;
  background: #111;
  border: 1px solid #27272a;
  display: flex;
  justify-content: center;
  align-items: center;
}

.video-wrapper video {
  width: 100%;
  height: 100%;
  object-fit: contain;
  background: black;
}

.video-label {
  position: absolute;
  top: 15px;
  left: 15px;
  background: rgba(9, 9, 11, 0.85);
  padding: 6px 14px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 600;
  border-left: 3px solid #a855f7;
  pointer-events: none;
}

/* DYNAMIC STATUS BADGE STYLING INSIDE THE VIEW PANEL */
#opponent-status-badge {
  border-left: 3px solid #ef4444;
  color: #f87171;
  transition: all 0.3s ease;
}
</style>
</head>
<body>

    <div id="control-menu">
        <div class="menu-group">
            <span style="font-weight: 800; color: #a855f7; letter-spacing: 0.5px; font-size: 18px;">AGAMES SHARE</span>
            <span id="status-text">Status: Waiting for action...</span>
        </div>
        <div class="menu-group" id="interactive-actions">
            <button id="btn-host">Host Live Screen</button>
            <span style="color: #71717a;" id="or-separator">or</span>
            <input type="text" id="room-input" placeholder="Enter Friend's Code" maxlength="4">
            <button id="btn-join">Join Stream</button>
        </div>
    </div>

    <div id="video-grid">
        <div class="video-wrapper">
            <video id="local-video" autoplay playsinline muted></video>
            <div class="video-label">Your Screen Feed</div>
        </div>
        <div class="video-wrapper">
            <video id="remote-video" autoplay playsinline></video>
            <!-- Label tracker changed to explicitly display live dynamic statuses -->
            <div class="video-label" id="opponent-status-badge">● Opponent Status: Offline</div>
        </div>
    </div>

<script>
const roomInput = document.getElementById('room-input');
const btnHost = document.getElementById('btn-host');
const btnJoin = document.getElementById('btn-join');
const statusText = document.getElementById('status-text');
const localVideo = document.getElementById('local-video');
const remoteVideo = document.getElementById('remote-video');
const orSeparator = document.getElementById('or-separator');
const opponentStatusBadge = document.getElementById('opponent-status-badge');

let peer = null;
let localStream = null;

// TURN/STUN Infrastructure configuration to route safely through strict school firewalls
const networkBypassConfig = {
    config: {
        'iceServers': [
            { 'urls': 'stun:://google.com' },
            { 'urls': 'stun:://google.com' },
            {
                'urls': 'turn:openrelay.metered.ca:443',
                'username': 'openrelayproject',
                'credential': 'openrelayproject'
            },
            {
                'urls': 'turn:openrelay.metered.ca:80',
                'username': 'openrelayproject',
                'credential': 'openrelayproject'
            }
        ]
    },
    debug: 1
};

// Changes the label styling on the opponent frame to green when connected online
function setOpponentOnline() {
    opponentStatusBadge.innerText = "● Opponent Status: Online";
    opponentStatusBadge.style.borderLeft = "3px solid #34d399";
    opponentStatusBadge.style.color = "#a7f3d0";
    opponentStatusBadge.style.background = "rgba(6, 78, 59, 0.85)";
}

async function startCapture() {
    try {
        localStream = await navigator.mediaDevices.getDisplayMedia({ 
            video: { cursor: "always" }, 
            audio: false 
        });
        localVideo.srcObject = localStream;
        return true;
    } catch (err) {
        statusText.innerText = "Status: Screen capture permission denied.";
        statusText.style.color = "#f43f5e";
        return false;
    }
}

// HOST LOGIC
btnHost.addEventListener('click', async () => {
    statusText.innerText = "Status: Awaiting screen confirmation...";
    statusText.style.color = "#f59e0b";

    const success = await startCapture();
    if (!success) return; 

    const randomCode = Math.floor(1000 + Math.random() * 9000).toString();
    
    // Clear out input buttons and swap status message to display the access key code explicitly
    btnHost.style.display = "none";
    btnJoin.style.display = "none";
    roomInput.style.display = "none";
    orSeparator.style.display = "none";
    
    statusText.innerText = `YOUR ROOM CODE: ${randomCode} (Give this to your friend)`;
    statusText.style.color = "#a855f7";
    statusText.style.fontSize = "16px";
    statusText.style.fontWeight = "800";

    peer = new Peer(`agames-share-${randomCode}`, networkBypassConfig);

    peer.on('call', (call) => {
        call.answer(localStream); 
        call.on('stream', (remoteStream) => {
            remoteVideo.srcObject = remoteStream;
            setOpponentOnline(); // Flashes opponent panel badge to online state
        });
    });

    peer.on('connection', (conn) => {
        conn.on('open', () => {
            setTimeout(() => {
                if(!remoteVideo.srcObject) {
                    const fallbackCall = peer.call(`agames-share-${randomCode}-client`, localStream);
                    fallbackCall.on('stream', (remoteStream) => {
                        remoteVideo.srcObject = remoteStream;
                        setOpponentOnline();
                    });
                }
            }, 600); 
        });
    });
});

// CLIENT JOIN LOGIC
btnJoin.addEventListener('click', async () => {
    const code = roomInput.value.trim();
    if (code.length !== 4 || isNaN(code)) {
        alert("Please enter a valid 4-digit code.");
        return;
    }

    const success = await startCapture();
    if (!success) return;

    // Clean out control menu buttons on the join side too
    btnHost.style.display = "none";
    btnJoin.style.display = "none";
    roomInput.style.display = "none";
    orSeparator.style.display = "none";

    const clientNodeId = `agames-share-${code}-client`;
    peer = new Peer(clientNodeId, networkBypassConfig);
    statusText.innerText = "Status: Connecting and punching through school firewall...";
    statusText.style.color = "#f59e0b";

    peer.on('open', () => {
        const targetHostId = `agames-share-${code}`;
        const dataConn = peer.connect(targetHostId);
        
        dataConn.on('open', () => {
            setTimeout(() => {
                const call = peer.call(targetHostId, localStream);
                call.on('stream', (remoteStream) => {
                    remoteVideo.srcObject = remoteStream;
                    setOpponentOnline(); // Flashes opponent panel badge to online state
                    statusText.innerText = "Status: Connected!";
                    statusText.style.color = "#10b981";
                });
            }, 500);
        });
    });

    peer.on('call', (incomingCall) => {
        incomingCall.answer(localStream);
        incomingCall.on('stream', (remoteStream) => {
            remoteVideo.srcObject = remoteStream;
            setOpponentOnline();
            statusText.innerText = "Status: Connected!";
            statusText.style.color = "#10b981";
        });
    });
});
</script>
</body>
</html>
