<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AGames - Pure P2P Screen Share</title>

<!-- PeerJS WebRTC Connection Library Script -->
<script src="https://unpkg.com"></script>

<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #09090b;
  font-family: system-ui, -apple-system, sans-serif;
  color: white;
}

/* TOP DASHBOARD CONTROL MENU */
#control-menu {
  height: 70px;
  background: #18181b;
  border-bottom: 2px solid #a855f7;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  box-sizing: border-box;
}

.menu-group { display: flex; align-items: center; gap: 15px; }

#status-text {
  font-size: 14px;
  color: #a1a1aa;
  font-weight: 500;
}

#room-input {
  background: #27272a;
  border: 1px solid #a855f7;
  color: white;
  padding: 8px 12px;
  border-radius: 6px;
  font-size: 14px;
  width: 160px;
  text-align: center;
  outline: none;
}

button {
  background: #a855f7;
  color: white;
  border: none;
  padding: 9px 18px;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
  font-size: 14px;
  transition: background 0.2s;
}
button:hover { background: #9333ea; }
button:disabled { background: #3f3f46; color: #a1a1aa; cursor: not-allowed; }

/* 50/50 SPLIT SCREEN VIDEO GRID */
#video-grid {
  display: flex;
  width: 100%;
  height: calc(100% - 70px);
  background: #09090b;
}

.video-wrapper {
  flex: 1;
  height: 100%;
  position: relative;
  background: #111;
  border: 1px solid #27272a;
  display: flex;
  justify-content: center;
  align-items: center;
}

.video-wrapper video {
  width: 100%;
  height: 100%;
  object-fit: contain;
  background: black;
}

.video-label {
  position: absolute;
  top: 15px;
  left: 15px;
  background: rgba(9, 9, 11, 0.85);
  padding: 6px 14px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 600;
  border-left: 3px solid #a855f7;
  pointer-events: none;
}
</style>
</head>
<body>

    <div id="control-menu">
        <div class="menu-group">
            <span style="font-weight: 800; color: #a855f7; letter-spacing: 0.5px;">AGAMES SHARE</span>
            <span id="status-text">Status: Offline</span>
        </div>
        <div class="menu-group">
            <button id="btn-host">Host Live Screen</button>
            <span style="color: #71717a;" id="or-separator">or</span>
            <input type="text" id="room-input" placeholder="Enter Friend's Code" maxlength="4">
            <button id="btn-join">Join Stream</button>
        </div>
    </div>

    <div id="video-grid">
        <div class="video-wrapper">
            <video id="local-video" autoplay playsinline muted></video>
            <div class="video-label">Your Screen Feed</div>
        </div>
        <div class="video-wrapper">
            <video id="remote-video" autoplay playsinline></video>
            <div class="video-label">Connected Friend's Screen</div>
        </div>
    </div>

<script>
const roomInput = document.getElementById('room-input');
const btnHost = document.getElementById('btn-host');
const btnJoin = document.getElementById('btn-join');
const statusText = document.getElementById('status-text');
const localVideo = document.getElementById('local-video');
const remoteVideo = document.getElementById('remote-video');

let peer = null;
let localStream = null;

// Prompts browser system screen frame tracking
async function startCapture() {
    try {
        localStream = await navigator.mediaDevices.getDisplayMedia({ 
            video: { cursor: "always" }, 
            audio: false 
        });
        localVideo.srcObject = localStream;
        return true;
    } catch (err) {
        statusText.innerText = "Error: Permission denied.";
        statusText.style.color = "#f43f5e";
        return false;
    }
}

// HOST CONNECTION LOGIC
btnHost.addEventListener('click', async () => {
    // Generate code IMMEDIATELY in the browser layout before touching the server ports
    const randomCode = Math.floor(1000 + Math.random() * 9000).toString();
    
    // Clear display menus and output your 4 digit random code
    btnHost.disabled = true;
    btnJoin.disabled = true;
    roomInput.style.display = "none";
    document.getElementById('or-separator').style.display = "none";
    statusText.innerText = `YOUR ROOM CODE: ${randomCode} (Give this to your friend)`;
    statusText.style.color = "#10b981";

    // Request screen share after displaying code layout
    const success = await startCapture();
    if (!success) {
        // Reset display buttons if screen capture failed
        btnHost.disabled = false;
        btnJoin.disabled = false;
        roomInput.style.display = "inline-block";
        document.getElementById('or-separator').style.display = "inline";
        statusText.innerText = "Status: Offline";
        statusText.style.color = "#a1a1aa";
        return;
    }
    
    // Connect backend peer connection stream nodes onto matching namespaces
    peer = new Peer(`agames-share-${randomCode}`, { debug: 1 });

    peer.on('error', (err) => {
        console.error(err);
        statusText.innerText = "Network Delay Notice: Re-attempting signaling channel lock...";
        statusText.style.color = "#f59e0b";
    });

    // Wait and accept incoming stream handshakes from join box actions
    peer.on('call', (call) => {
        statusText.innerText = "Friend Connected! Sharing live video frames.";
        statusText.style.color = "#a855f7";
        call.answer(localStream); 
        
        call.on('stream', (remoteStream) => {
            remoteVideo.srcObject = remoteStream;
        });
        
        call.on('close', () => {
            remoteVideo.srcObject = null;
            statusText.innerText = "Friend left stream session.";
            statusText.style.color = "#f43f5e";
        });
    });
});

// CLIENT JOIN LOGIC
btnJoin.addEventListener('click', async () => {
    const code = roomInput.value.trim();
    if (code.length !== 4 || isNaN(code)) {
        alert("Please enter a valid 4-digit code.");
        return;
    }

    const success = await startCapture();
    if (!success) return;

    peer = new Peer({ debug: 1 });
    statusText.innerText = "Connecting to friend's game room...";
    statusText.style.color = "#f59e0b";

    peer.on('open', () => {
        const targetPeerId = `agames-share-${code}`;
        const call = peer.call(targetPeerId, localStream);
        
        call.on('stream', (remoteStream) => {
            statusText.innerText = "Connected successfully! Active synchronization active.";
            statusText.style.color = "#10b981";
            remoteVideo.srcObject = remoteStream;
        });

        call.on('close', () => {
            remoteVideo.srcObject = null;
            statusText.innerText = "Disconnected from room.";
            statusText.style.color = "#f43f5e";
        });
    });

    peer.on('error', (err) => {
        console.error(err);
        statusText.innerText = "Match failed. Wrong room code or host closed down.";
        statusText.style.color = "#f43f5e";
    });
});
</script>

</body>
</html>
